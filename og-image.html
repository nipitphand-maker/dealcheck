<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="google-site-verification" content="YPFBI_qSMc8OWCAuNyRFKw-xe0C4d0xpLsZKSqlNb-s">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=Sarabun:wght@600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:1200px;height:630px;
  background:linear-gradient(135deg,#fdf2f8 0%,#fdebf3 35%,#e8f9f3 70%,#d8f5e8 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Nunito','Helvetica Neue',sans-serif;
  color:#3d2645;overflow:hidden;position:relative;
}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5}
.b1{width:380px;height:380px;background:#fbc2eb;top:-80px;left:-80px}
.b2{width:300px;height:300px;background:#a1f4c8;bottom:-60px;right:-60px}
.container{display:flex;align-items:center;gap:60px;z-index:1;padding:0 70px}
.icon-box{
  width:380px;height:380px;
  border-radius:80px;
  background:#fff;
  box-shadow:0 30px 80px rgba(244,114,182,.25), 0 10px 30px rgba(45,212,191,.15);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  overflow:hidden;
}
.icon-box img{width:100%;height:100%;object-fit:contain}
.text-block{display:flex;flex-direction:column;gap:18px;max-width:560px}
.brand{
  font-family:'Nunito',sans-serif;
  font-weight:900;font-size:108px;letter-spacing:-3px;line-height:1;
}
.brand .d{color:#f472b6}
.brand .c{color:#2dd4bf}
.brand .cart{font-size:80px;margin-left:6px}
.tag-th{
  font-family:'Sarabun',sans-serif;
  font-weight:800;font-size:42px;color:#3d2645;line-height:1.2;
}
.tag-en{
  font-family:'Nunito',sans-serif;
  font-weight:700;font-size:30px;color:#a07898;line-height:1.3;
}
.pills{display:flex;gap:10px;margin-top:6px}
.pill{
  padding:10px 22px;border-radius:99px;font-size:22px;font-weight:800;
  font-family:'Nunito',sans-serif;
}
.pill.pink{background:#f472b6;color:#fff}
.pill.teal{background:#2dd4bf;color:#fff}
.pill.outline{background:#fff;color:#3d2645;border:2px solid #f0d6eb}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="container">
  <div class="icon-box">
    <img src="New_icon.png" alt="DealCheck">
  </div>
  <div class="text-block">
    <div class="brand"><span class="d">Deal</span><span class="c">Check</span><span class="cart">🛒</span></div>
    <div class="tag-th">อันไหนคุ้มกว่า?</div>
    <div class="tag-en">Compare prices · Find the best deal</div>
    <div class="pills">
      <span class="pill pink">1แถม1</span>
      <span class="pill teal">ลด %</span>
      <span class="pill outline">ใช้ฟรี · Free</span>
    </div>
  </div>
</div>
</body>
</html>
