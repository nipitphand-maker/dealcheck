<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" role="img" aria-label="7 tips for smarter supermarket shopping">
  <title>7 tips for smarter supermarket shopping</title>
  <rect width="600" height="180" fill="#fef6fb" rx="14"/>
  <text x="20" y="28" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#3d2645">7 habits of frugal shoppers</text>

  <!-- Tip 1 -->
  <circle cx="44" cy="62" r="18" fill="#f472b6"/>
  <text x="44" y="67" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="70" y="59" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="700" fill="#3d2645">Check unit price</text>
  <text x="70" y="73" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#a07898">per ml / g / oz</text>

  <!-- Tip 2 -->
  <circle cx="204" cy="62" r="18" fill="#f472b6"/>
  <text x="204" y="67" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="230" y="59" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="700" fill="#3d2645">Verify multi-packs</text>
  <text x="230" y="73" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#a07898">not always cheaper</text>

  <!-- Tip 3 -->
  <circle cx="364" cy="62" r="18" fill="#f472b6"/>
  <text x="364" y="67" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="390" y="59" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="700" fill="#3d2645">Compare brands</text>
  <text x="390" y="73" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#a07898">at least 2–3 options</text>

  <!-- Tip 4 -->
  <circle cx="524" cy="62" r="18" fill="#2dd4bf"/>
  <text x="524" y="67" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="548" y="59" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="700" fill="#3d2645">Ignore red tags</text>
  <text x="548" y="73" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#a07898">check numbers only</text>

  <!-- Tip 5 -->
  <circle cx="44" cy="130" r="18" fill="#2dd4bf"/>
  <text x="44" y="135" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <text x="70" y="127" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="700" fill="#3d2645">Shop with a list</text>
  <text x="70" y="141" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#a07898">avoid impulse buys</text>

  <!-- Tip 6 -->
  <circle cx="204" cy="130" r="18" fill="#2dd4bf"/>
  <text x="204" y="135" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <text x="230" y="127" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="700" fill="#3d2645">Time your shop</text>
  <text x="230" y="141" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#a07898">evenings = markdowns</text>

  <!-- Tip 7 -->
  <circle cx="364" cy="130" r="18" fill="#2dd4bf"/>
  <text x="364" y="135" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">7</text>
  <text x="390" y="127" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="700" fill="#3d2645">Use DealCheck</text>
  <text x="390" y="141" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#a07898">decide in 30 seconds</text>
</svg>
