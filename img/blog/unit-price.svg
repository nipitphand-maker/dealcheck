<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280" font-family="'Helvetica Neue',Arial,sans-serif">
  <!-- Background -->
  <rect width="600" height="280" fill="#fef6fb" rx="16"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="600" height="50" fill="#f472b6" rx="16"/>
  <rect x="0" y="34" width="600" height="16" fill="#f472b6"/>
  <text x="300" y="31" text-anchor="middle" font-size="15" font-weight="900" fill="#fff" letter-spacing="-0.3">วิธีคำนวณราคาต่อหน่วย</text>

  <!-- Formula section label -->
  <text x="300" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#a07898" letter-spacing="1">สูตร</text>

  <!-- Formula pill -->
  <rect x="60" y="78" width="480" height="46" rx="12" fill="#fff" stroke="#f472b6" stroke-width="2"/>
  <text x="300" y="107" text-anchor="middle" font-size="20" font-weight="900" fill="#f472b6" letter-spacing="0.5">ราคา ÷ ปริมาณ = ราคาต่อหน่วย</text>

  <!-- Arrow down -->
  <line x1="300" y1="130" x2="300" y2="143" stroke="#2dd4bf" stroke-width="2.5" stroke-dasharray="4,2"/>
  <polygon points="300,148 294,138 306,138" fill="#2dd4bf"/>

  <!-- Example box -->
  <rect x="120" y="152" width="360" height="44" rx="10" fill="#f0fdf4" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="300" y="170" text-anchor="middle" font-size="12" fill="#3d2645" font-weight="700">ตัวอย่าง: น้ำดื่ม 1.5 ลิตร ราคา 15 บาท</text>
  <text x="300" y="188" text-anchor="middle" font-size="14" font-weight="900" fill="#059669">15 ÷ 1,500 ml = 0.010 บาท/ml</text>

  <!-- Divider -->
  <line x1="32" y1="210" x2="568" y2="210" stroke="#f0d6eb" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Comparison label -->
  <text x="300" y="226" text-anchor="middle" font-size="12" font-weight="800" fill="#3d2645">เปรียบสองขนาด — อันไหนคุ้มกว่า?</text>

  <!-- Option A: 600ml — more expensive per ml -->
  <rect x="20" y="233" width="266" height="40" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="30" y="250" font-size="13" font-weight="800" fill="#dc2626">น้ำ 600 ml @ 7 บาท</text>
  <text x="30" y="267" font-size="12" fill="#dc2626">0.0117 บาท/ml</text>
  <!-- Red dot indicator -->
  <circle cx="268" cy="253" r="9" fill="#dc2626"/>
  <text x="268" y="258" text-anchor="middle" font-size="12" font-weight="900" fill="#fff">✕</text>

  <!-- Option B: 1.5L — cheaper per ml -->
  <rect x="314" y="233" width="266" height="40" rx="10" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="324" y="250" font-size="13" font-weight="800" fill="#059669">น้ำ 1.5 L @ 15 บาท</text>
  <text x="324" y="267" font-size="12" fill="#059669">0.0100 บาท/ml  ✓ คุ้มกว่า</text>
  <!-- Green dot indicator -->
  <circle cx="332" cy="253" r="9" fill="#059669"/>
  <text x="332" y="258" text-anchor="middle" font-size="12" font-weight="900" fill="#fff">✓</text>

  <!-- Footer -->
  <text x="300" y="278" text-anchor="middle" font-size="10" fill="#a07898">dealcheck-app.pages.dev — คำนวณราคาต่อหน่วยอัตโนมัติ</text>
</svg>
